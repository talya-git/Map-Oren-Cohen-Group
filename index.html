<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מפת דירות למכירה - ירושלים</title>
    <link rel="stylesheet" href="leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            direction: rtl;
        }

        #header {
            background: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        #header h1 {
            font-size: 1.5em;
        }

        #stats {
            font-size: 0.9em;
            opacity: 0.8;
        }

        #add-btn {
            padding: 8px 20px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
        }

        #add-btn:hover {
            background: #219a52;
        }

        #map {
            height: calc(100vh - 60px);
            width: 100%;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 12px;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            direction: rtl;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .modal label {
            display: block;
            margin-top: 10px;
            margin-bottom: 4px;
            font-weight: bold;
            font-size: 0.9em;
            color: #555;
        }

        .modal input, .modal textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.9em;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            direction: rtl;
        }

        .modal textarea {
            min-height: 60px;
            resize: vertical;
        }

        .modal-buttons {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
        }

        .btn-save {
            background: #27ae60;
            color: white;
        }

        .btn-save:hover {
            background: #219a52;
        }

        .btn-cancel {
            background: #e74c3c;
            color: white;
        }

        .btn-cancel:hover {
            background: #c0392b;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 10px;
            color: #3498db;
            font-size: 0.9em;
        }

        .loading.active {
            display: block;
        }

        .apartment-popup {
            direction: rtl;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            min-width: 280px;
        }

        .apartment-popup h3 {
            color: #2c3e50;
            margin-bottom: 8px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
        }

        .apartment-popup .detail {
            margin: 5px 0;
            font-size: 0.9em;
        }

        .apartment-popup .detail strong {
            color: #555;
        }

        .apartment-popup .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            margin-top: 5px;
            color: white;
            background: #3498db;
        }

        .leaflet-popup-content-wrapper {
            border-radius: 10px;
        }

        .note-section {
            margin-top: 10px;
            border-top: 1px solid #eee;
            padding-top: 8px;
        }

        .note-section textarea {
            width: 100%;
            min-height: 60px;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 8px;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            font-size: 0.85em;
            direction: rtl;
            resize: vertical;
        }

        .note-section textarea:focus {
            outline: none;
            border-color: #3498db;
        }

        .save-note-btn {
            margin-top: 5px;
            padding: 5px 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
        }

        .save-note-btn:hover {
            background: #2980b9;
        }

        .saved-note {
            margin-top: 5px;
            padding: 6px 10px;
            background: #fffde7;
            border-right: 3px solid #f39c12;
            border-radius: 3px;
            font-size: 0.85em;
            white-space: pre-wrap;
        }

        .delete-btn {
            margin-top: 8px;
            padding: 5px 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.3em;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <div id="loading-screen">🔄 טוען מפה...</div>

    <div id="header">
        <h1>🏠 מפת דירות - ירושלים</h1>
        <button id="add-btn" onclick="openAddModal()">➕ הוסף דירה חדשה</button>
        <div id="stats"></div>
    </div>
    <div id="map"></div>

    <!-- Modal להוספת דירה -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2>➕ הוספת דירה חדשה</h2>
            
            <label>כתובת (רחוב ומספר)</label>
            <input type="text" id="input-address" placeholder="לדוגמה: קינג ג'ורג' 25, ירושלים" />
            
            <label>שכונה</label>
            <input type="text" id="input-neighborhood" placeholder="לדוגמה: רחביה" />

            <label>סוג נכס</label>
            <input type="text" id="input-type" placeholder="לדוגמה: דירה, פנטהאוז, דירת גן..." />

            <label>סטטוס</label>
            <input type="text" id="input-status" placeholder="לדוגמה: בלעדיות, ללא בלעדיות, שכירות..." />

            <label>בטיפול של</label>
            <input type="text" id="input-handler" placeholder="שם המטפל/ת" />

            <label>הערות</label>
            <textarea id="input-notes" placeholder="פרטים נוספים..."></textarea>

            <div class="loading" id="loading-msg">🔍 מחפש את הכתובת על המפה...</div>

            <div class="modal-buttons">
                <button class="btn-save" onclick="addNewApartment()">✓ הוסף למפה</button>
                <button class="btn-cancel" onclick="closeAddModal()">✗ ביטול</button>
            </div>
        </div>
    </div>

    <script src="leaflet.js"></script>
    <script>
        // ============================================
        // הגדרת Google Sheets API
        // יש להחליף את ה-URL הזה ב-URL של ה-Web App שלך
        // ============================================
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwcax1ViZdIOAvpledWauTDUhJbNkt0jZwUXiEQGe0RQFa-zU2f2cE50flge_2MivXd_A/exec';

        let apartments = [];
        let map;
        let markers = {};

        // === אתחול ===
        async function init() {
            map = L.map('map', { zoomControl: true }).setView([31.7683, 35.2150], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            apartments = await loadData();
            apartments.forEach(apt => addMarkerToMap(apt));
            updateStats();

            document.getElementById('loading-screen').style.display = 'none';
        }

        // === טעינת נתונים מ-Google Sheets ===
        async function loadData() {
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL + '?action=getAll');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) {
                        return data;
                    }
                }
            } catch(e) {
                console.log('Error loading from Google Sheets:', e);
            }
            
            // fallback to localStorage
            const saved = localStorage.getItem('shared_apartments');
            return saved ? JSON.parse(saved) : [];
        }

        // === שמירת דירה חדשה ל-Google Sheets ===
        async function saveNewApartment(apt) {
            localStorage.setItem('shared_apartments', JSON.stringify(apartments));
            
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'add', data: apt })
                });
            } catch(e) {
                console.log('Error saving to Google Sheets:', e);
            }
        }

        // === מחיקת דירה מ-Google Sheets ===
        async function removeApartment(id) {
            localStorage.setItem('shared_apartments', JSON.stringify(apartments));
            
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'delete', id: id })
                });
            } catch(e) {
                console.log('Error deleting from Google Sheets:', e);
            }
        }

        // === עדכון הערה ב-Google Sheets ===
        async function updateNote(id, note) {
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'updateNote', id: id, note: note })
                });
            } catch(e) {
                console.log('Error updating note:', e);
            }
        }

        // === סמנים ===
        function createCustomIcon(type) {
            const size = 28;
            const color = '#2c3e50';
            return L.divIcon({
                html: `<div style="
                    background-color: ${color};
                    width: ${size}px;
                    height: ${size}px;
                    border-radius: 50% 50% 50% 0;
                    transform: rotate(-45deg);
                    border: 3px solid white;
                    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
                "></div>`,
                iconSize: [size, size],
                iconAnchor: [size/2, size],
                popupAnchor: [0, -size],
                className: ''
            });
        }

        function addMarkerToMap(apt) {
            const icon = createCustomIcon(apt.type);

            let popupContent = `
                <div class="apartment-popup">
                    <h3>${apt.address}</h3>
                    <div class="detail"><strong>שכונה:</strong> ${apt.neighborhood}</div>
                    <div class="detail"><strong>סוג:</strong> ${apt.type}</div>
                    <div class="detail"><strong>סטטוס:</strong> ${apt.status}</div>
            `;

            if (apt.handler) {
                popupContent += `<div class="detail"><strong>בטיפול:</strong> ${apt.handler}</div>`;
            }

            if (apt.notes) {
                popupContent += `<div class="detail"><strong>הערות:</strong> ${apt.notes}</div>`;
            }

            popupContent += `
                    <span class="status-badge">${apt.status}</span>
                    
                    <div class="note-section">
                        <textarea id="note-input-${apt.id}" placeholder="הוסיפי הערה או מלל...">${apt.userNote || ''}</textarea>
                        <button class="save-note-btn" onclick="saveNoteForApt('${apt.id}')">💾 שמור הערה</button>
                    </div>
                    <button class="delete-btn" onclick="deleteApartment('${apt.id}')">🗑️ מחק נכס</button>
                </div>
            `;

            const marker = L.marker([apt.lat, apt.lng], { icon: icon })
                .addTo(map)
                .bindPopup(popupContent, { maxWidth: 320 });
            
            markers[apt.id] = marker;
        }

        // === שמירת הערה ===
        async function saveNoteForApt(id) {
            const textarea = document.getElementById(`note-input-${id}`);
            const text = textarea.value.trim();
            
            const apt = apartments.find(a => a.id == id);
            if (apt) {
                apt.userNote = text;
                await updateNote(id, text);
                alert('ההערה נשמרה! ✓');
            }
        }

        // === מחיקת דירה ===
        async function deleteApartment(id) {
            if (!confirm('למחוק את הנכס הזה מהמפה?')) return;
            
            if (markers[id]) {
                map.removeLayer(markers[id]);
                delete markers[id];
            }
            
            apartments = apartments.filter(a => a.id != id);
            await removeApartment(id);
            updateStats();
            alert('הנכס נמחק! ✓');
        }

        // === Modal ===
        function openAddModal() {
            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeAddModal() {
            document.getElementById('modal-overlay').classList.remove('active');
            document.getElementById('input-address').value = '';
            document.getElementById('input-neighborhood').value = '';
            document.getElementById('input-type').value = '';
            document.getElementById('input-status').value = '';
            document.getElementById('input-handler').value = '';
            document.getElementById('input-notes').value = '';
            document.getElementById('loading-msg').classList.remove('active');
        }

        async function geocodeAddress(address) {
            const query = encodeURIComponent(address + ', ירושלים, ישראל');
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${query}&limit=1`;
            
            const response = await fetch(url);
            const data = await response.json();
            
            if (data && data.length > 0) {
                return {
                    lat: parseFloat(data[0].lat),
                    lng: parseFloat(data[0].lon)
                };
            }
            return null;
        }

        async function addNewApartment() {
            const address = document.getElementById('input-address').value.trim();
            const neighborhood = document.getElementById('input-neighborhood').value.trim();
            const type = document.getElementById('input-type').value.trim();
            const status = document.getElementById('input-status').value.trim();
            const handler = document.getElementById('input-handler').value.trim();
            const notes = document.getElementById('input-notes').value.trim();

            if (!address) {
                alert('נא להזין כתובת');
                return;
            }

            document.getElementById('loading-msg').classList.add('active');

            try {
                const coords = await geocodeAddress(address);
                
                if (!coords) {
                    alert('לא הצלחתי למצוא את הכתובת. נסי לכתוב אותה בצורה אחרת.');
                    document.getElementById('loading-msg').classList.remove('active');
                    return;
                }

                const newApt = {
                    id: Date.now().toString(),
                    address: address,
                    neighborhood: neighborhood || 'ירושלים',
                    lat: coords.lat,
                    lng: coords.lng,
                    type: type || 'דירה',
                    status: status || 'בלעדיות',
                    handler: handler,
                    notes: notes,
                    userNote: ''
                };

                apartments.push(newApt);
                addMarkerToMap(newApt);
                await saveNewApartment(newApt);

                map.setView([coords.lat, coords.lng], 16);
                updateStats();
                closeAddModal();
                alert('הדירה נוספה בהצלחה! ✓');

            } catch (error) {
                alert('שגיאה בחיפוש הכתובת. בדקי את חיבור האינטרנט ונסי שוב.');
                document.getElementById('loading-msg').classList.remove('active');
            }
        }

        // === סטטיסטיקות ===
        function updateStats() {
            document.getElementById('stats').innerHTML = `סה"כ: ${apartments.length} נכסים`;
        }

        // === הפעלה ===
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מפת דירות למכירה - ירושלים</title>
    <link rel="stylesheet" href="leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            direction: rtl;
        }

        #toolbar {
            background: #2c3e50;
            color: white;
            padding: 6px 10px;
        }

        #toolbar-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        #toolbar-top h1 {
            font-size: 1em;
            margin: 0;
        }

        #stats {
            font-size: 0.7em;
            opacity: 0.8;
            margin-right: 5px;
        }

        #add-btn {
            padding: 5px 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: bold;
        }

        #add-btn:hover {
            background: #219a52;
        }

        #toolbar-bottom {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #search-input {
            width: 120px;
            padding: 5px 8px;
            border: none;
            border-radius: 4px;
            font-size: 0.8em;
            direction: rtl;
        }

        #search-input:focus {
            outline: 2px solid #3498db;
        }

        .filter-btn {
            padding: 4px 7px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.7em;
            font-weight: bold;
            color: white;
            opacity: 0.6;
            transition: opacity 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .filter-btn.active {
            opacity: 1;
        }

        .filter-btn:hover {
            opacity: 1;
        }

        .filter-all { background: #95a5a6; }
        .filter-exclusive { background: #27ae60; }
        .filter-no-exclusive { background: #9b59b6; }
        .filter-rental { background: #3498db; }
        .filter-signed { background: #e74c3c; }

        #map {
            height: calc(100vh - 65px);
            width: 100%;
        }

        @media (max-width: 600px) {
            #toolbar {
                padding: 4px 8px;
            }
            #toolbar-top h1 {
                font-size: 0.85em;
            }
            #toolbar-top {
                margin-bottom: 3px;
            }
            #add-btn {
                padding: 4px 8px;
                font-size: 0.7em;
            }
            #search-input {
                width: 90px;
                padding: 4px 6px;
                font-size: 0.75em;
            }
            .filter-btn {
                padding: 3px 5px;
                font-size: 0.65em;
            }
            #map {
                height: calc(100vh - 58px);
            }
            .apartment-popup {
                min-width: 200px;
            }
            .apartment-popup h3 {
                font-size: 0.9em;
            }
            .apartment-popup .detail {
                font-size: 0.8em;
            }
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 12px;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            direction: rtl;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .modal label {
            display: block;
            margin-top: 10px;
            margin-bottom: 4px;
            font-weight: bold;
            font-size: 0.9em;
            color: #555;
        }

        .modal input, .modal textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.9em;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            direction: rtl;
        }

        .modal textarea {
            min-height: 60px;
            resize: vertical;
        }

        .modal-buttons {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
        }

        .btn-save {
            background: #27ae60;
            color: white;
        }

        .btn-save:hover {
            background: #219a52;
        }

        .btn-cancel {
            background: #e74c3c;
            color: white;
        }

        .btn-cancel:hover {
            background: #c0392b;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 10px;
            color: #3498db;
            font-size: 0.9em;
        }

        .loading.active {
            display: block;
        }

        .apartment-popup {
            direction: rtl;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            min-width: 280px;
        }

        .apartment-popup h3 {
            color: #2c3e50;
            margin-bottom: 8px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
        }

        .apartment-popup .detail {
            margin: 5px 0;
            font-size: 0.9em;
        }

        .apartment-popup .detail strong {
            color: #555;
        }

        .apartment-popup .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            margin-top: 5px;
            color: white;
        }

        .leaflet-popup-content-wrapper {
            border-radius: 10px;
        }

        .note-section {
            margin-top: 10px;
            border-top: 1px solid #eee;
            padding-top: 8px;
        }

        .note-section textarea {
            width: 100%;
            min-height: 60px;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 8px;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            font-size: 0.85em;
            direction: rtl;
            resize: vertical;
        }

        .note-section textarea:focus {
            outline: none;
            border-color: #3498db;
        }

        .save-note-btn {
            margin-top: 5px;
            padding: 5px 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
        }

        .save-note-btn:hover {
            background: #2980b9;
        }

        .delete-btn {
            margin-top: 8px;
            padding: 5px 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.3em;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <div id="loading-screen">🔄 טוען מפה...</div>

    <div id="toolbar">
        <div id="toolbar-top">
            <h1>🏠 Oren Cohen Group</h1>
            <button id="add-btn" onclick="openAddModal()">➕ הוסף</button>
        </div>
        <div id="toolbar-bottom">
            <input type="text" id="search-input" placeholder="🔍 חיפוש..." oninput="filterApartments()" />
            <button class="filter-btn filter-all active" onclick="setFilter('all')">הכל</button>
            <button class="filter-btn filter-exclusive" onclick="setFilter('בלעדיות')">🟢</button>
            <button class="filter-btn filter-no-exclusive" onclick="setFilter('ללא בלעדיות')">🟣</button>
            <button class="filter-btn filter-rental" onclick="setFilter('שכירות')">🔵</button>
            <button class="filter-btn filter-signed" onclick="setFilter('חתום')">🔴</button>
            <span id="stats"></span>
        </div>
    </div>

    <div id="map"></div>

    <!-- Modal להוספת דירה -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2>➕ הוספת דירה חדשה</h2>
            
            <label>כתובת (רחוב ומספר)</label>
            <input type="text" id="input-address" placeholder="לדוגמה: קינג ג'ורג' 25, ירושלים" />
            
            <label>שכונה</label>
            <input type="text" id="input-neighborhood" placeholder="לדוגמה: רחביה" />

            <label>סוג נכס</label>
            <input type="text" id="input-type" placeholder="לדוגמה: דירה, פנטהאוז, דירת גן..." />

            <label>סטטוס</label>
            <input type="text" id="input-status" placeholder="לדוגמה: בלעדיות, ללא בלעדיות, שכירות..." />

            <label>בטיפול של</label>
            <input type="text" id="input-handler" placeholder="שם המטפל/ת" />

            <label>הערות</label>
            <textarea id="input-notes" placeholder="פרטים נוספים..."></textarea>

            <div class="loading" id="loading-msg">🔍 מחפש את הכתובת על המפה...</div>

            <div class="modal-buttons">
                <button class="btn-save" onclick="addNewApartment()">✓ הוסף למפה</button>
                <button class="btn-cancel" onclick="closeAddModal()">✗ ביטול</button>
            </div>
        </div>
    </div>

    <script src="leaflet.js"></script>
    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxBgokXMrh3zjeZMU4ABcr_bR2UDh1nQRikX6tI-nc7JwiRPkQdEHishmn-dlN0q4TH/exec';

        let apartments = [];
        let map;
        let markers = {};
        let currentFilter = 'all';

        // === צבעים לפי סטטוס ===
        function getStatusColor(status) {
            if (!status) return '#95a5a6';
            const s = status.trim();
            if (s === 'בלעדיות') return '#27ae60';
            if (s === 'ללא בלעדיות') return '#9b59b6';
            if (s === 'שכירות') return '#3498db';
            if (s === 'חתום') return '#e74c3c';
            return '#95a5a6';
        }

        // === משרדים ===
        const offices = [
            { name: 'משרד ראשי - Oren Cohen Group', address: 'הקרן הקיימת לישראל 33', lat: 31.7720, lng: 35.2130 },
            { name: 'משרד פרויקטים', address: 'הקרן הקיימת לישראל 29', lat: 31.7718, lng: 35.2125 }
        ];

        function addOfficeMarkers() {
            const officeIcon = L.divIcon({
                html: `<img src="logo.png" style="width:40px;height:40px;border-radius:50%;border:3px solid gold;box-shadow:0 2px 8px rgba(0,0,0,0.4);" />`,
                iconSize: [40, 40],
                iconAnchor: [20, 20],
                popupAnchor: [0, -20],
                className: ''
            });

            offices.forEach(office => {
                L.marker([office.lat, office.lng], { icon: officeIcon })
                    .addTo(map)
                    .bindPopup(`<div class="apartment-popup"><h3>${office.name}</h3><div class="detail">${office.address}</div></div>`);
            });
        }

        // === אתחול ===
        async function init() {
            map = L.map('map', { zoomControl: true }).setView([31.7683, 35.2150], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            apartments = await loadData();
            apartments.forEach(apt => addMarkerToMap(apt));
            addOfficeMarkers();
            updateStats();

            document.getElementById('loading-screen').style.display = 'none';
        }

        // === טעינת נתונים מ-Google Sheets ===
        async function loadData() {
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL + '?action=getAll', {
                    redirect: 'follow'
                });
                if (response.ok) {
                    const text = await response.text();
                    const data = JSON.parse(text);
                    if (data && data.length > 0) {
                        return data;
                    }
                }
            } catch(e) {
                console.log('Error loading from Google Sheets:', e);
            }
            
            const saved = localStorage.getItem('shared_apartments');
            return saved ? JSON.parse(saved) : [];
        }

        // === שמירת דירה חדשה ===
        async function saveNewApartment(apt) {
            localStorage.setItem('shared_apartments', JSON.stringify(apartments));
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'add', data: apt })
                });
            } catch(e) {
                console.log('Error saving:', e);
            }
        }

        // === מחיקת דירה ===
        async function removeApartment(id) {
            localStorage.setItem('shared_apartments', JSON.stringify(apartments));
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'delete', id: id })
                });
            } catch(e) {
                console.log('Error deleting:', e);
            }
        }

        // === עדכון הערה ===
        async function updateNote(id, note) {
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'updateNote', id: id, note: note })
                });
            } catch(e) {
                console.log('Error updating note:', e);
            }
        }

        // === סמנים ===
        function createCustomIcon(status) {
            const size = 28;
            const color = getStatusColor(status);
            return L.divIcon({
                html: `<div style="
                    background-color: ${color};
                    width: ${size}px;
                    height: ${size}px;
                    border-radius: 50% 50% 50% 0;
                    transform: rotate(-45deg);
                    border: 3px solid white;
                    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
                "></div>`,
                iconSize: [size, size],
                iconAnchor: [size/2, size],
                popupAnchor: [0, -size],
                className: ''
            });
        }

        function addMarkerToMap(apt) {
            const icon = createCustomIcon(apt.status);
            const statusColor = getStatusColor(apt.status);

            let popupContent = `
                <div class="apartment-popup">
                    <h3>${apt.address}</h3>
                    <div class="detail"><strong>שכונה:</strong> ${apt.neighborhood}</div>
                    <div class="detail"><strong>סוג:</strong> ${apt.type}</div>
                    <div class="detail"><strong>סטטוס:</strong> ${apt.status}</div>
            `;

            if (apt.handler) {
                popupContent += `<div class="detail"><strong>בטיפול:</strong> ${apt.handler}</div>`;
            }
            if (apt.notes) {
                popupContent += `<div class="detail"><strong>הערות:</strong> ${apt.notes}</div>`;
            }

            popupContent += `
                    <span class="status-badge" style="background:${statusColor}">${apt.status}</span>
                    
                    <div class="note-section">
                        <textarea id="note-input-${apt.id}" placeholder="הוסיפי הערה או מלל...">${apt.userNote || ''}</textarea>
                        <button class="save-note-btn" onclick="saveNoteForApt('${apt.id}')">💾 שמור הערה</button>
                    </div>
                    <button class="delete-btn" onclick="deleteApartment('${apt.id}')">🗑️ מחק נכס</button>
                </div>
            `;

            const marker = L.marker([apt.lat, apt.lng], { icon: icon })
                .addTo(map)
                .bindPopup(popupContent, { maxWidth: 320 });
            
            markers[apt.id] = marker;
        }

        // === חיפוש וסינון ===
        function filterApartments() {
            const searchText = document.getElementById('search-input').value.trim().toLowerCase();
            
            apartments.forEach(apt => {
                const marker = markers[apt.id];
                if (!marker) return;

                const matchesSearch = !searchText || 
                    (apt.address && apt.address.toLowerCase().includes(searchText)) ||
                    (apt.neighborhood && apt.neighborhood.toLowerCase().includes(searchText)) ||
                    (apt.handler && apt.handler.toLowerCase().includes(searchText)) ||
                    (apt.type && apt.type.toLowerCase().includes(searchText)) ||
                    (apt.notes && apt.notes.toLowerCase().includes(searchText));

                const matchesFilter = currentFilter === 'all' || 
                    (apt.status && apt.status.trim() === currentFilter);

                if (matchesSearch && matchesFilter) {
                    marker.addTo(map);
                } else {
                    map.removeLayer(marker);
                }
            });
        }

        function setFilter(filter) {
            currentFilter = filter;
            
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            filterApartments();
        }

        // === שמירת הערה ===
        async function saveNoteForApt(id) {
            const textarea = document.getElementById(`note-input-${id}`);
            const text = textarea.value.trim();
            
            const apt = apartments.find(a => a.id == id);
            if (apt) {
                apt.userNote = text;
                await updateNote(id, text);
                alert('ההערה נשמרה! ✓');
            }
        }

        // === מחיקת דירה ===
        async function deleteApartment(id) {
            if (!confirm('למחוק את הנכס הזה מהמפה?')) return;
            
            if (markers[id]) {
                map.removeLayer(markers[id]);
                delete markers[id];
            }
            
            apartments = apartments.filter(a => a.id != id);
            await removeApartment(id);
            updateStats();
            alert('הנכס נמחק! ✓');
        }

        // === Modal ===
        function openAddModal() {
            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeAddModal() {
            document.getElementById('modal-overlay').classList.remove('active');
            document.getElementById('input-address').value = '';
            document.getElementById('input-neighborhood').value = '';
            document.getElementById('input-type').value = '';
            document.getElementById('input-status').value = '';
            document.getElementById('input-handler').value = '';
            document.getElementById('input-notes').value = '';
            document.getElementById('loading-msg').classList.remove('active');
        }

        async function geocodeAddress(address) {
            const query = encodeURIComponent(address + ', ירושלים, ישראל');
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${query}&limit=1`;
            const response = await fetch(url);
            const data = await response.json();
            if (data && data.length > 0) {
                return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
            }
            return null;
        }

        async function addNewApartment() {
            const address = document.getElementById('input-address').value.trim();
            const neighborhood = document.getElementById('input-neighborhood').value.trim();
            const type = document.getElementById('input-type').value.trim();
            const status = document.getElementById('input-status').value.trim();
            const handler = document.getElementById('input-handler').value.trim();
            const notes = document.getElementById('input-notes').value.trim();

            if (!address) { alert('נא להזין כתובת'); return; }

            document.getElementById('loading-msg').classList.add('active');

            try {
                const coords = await geocodeAddress(address);
                if (!coords) {
                    alert('לא הצלחתי למצוא את הכתובת. נסי לכתוב אותה בצורה אחרת.');
                    document.getElementById('loading-msg').classList.remove('active');
                    return;
                }

                const newApt = {
                    id: Date.now().toString(),
                    address, neighborhood: neighborhood || 'ירושלים',
                    lat: coords.lat, lng: coords.lng,
                    type: type || 'דירה', status: status || 'בלעדיות',
                    handler, notes, userNote: ''
                };

                apartments.push(newApt);
                addMarkerToMap(newApt);
                await saveNewApartment(newApt);
                map.setView([coords.lat, coords.lng], 16);
                updateStats();
                closeAddModal();
                alert('הדירה נוספה בהצלחה! ✓');
            } catch (error) {
                alert('שגיאה בחיפוש הכתובת. בדקי את חיבור האינטרנט ונסי שוב.');
                document.getElementById('loading-msg').classList.remove('active');
            }
        }

        // === סטטיסטיקות ===
        function updateStats() {
            const exclusive = apartments.filter(a => a.status && a.status.trim() === 'בלעדיות').length;
            const noExclusive = apartments.filter(a => a.status && a.status.trim() === 'ללא בלעדיות').length;
            const rental = apartments.filter(a => a.status && a.status.trim() === 'שכירות').length;
            const signed = apartments.filter(a => a.status && a.status.trim() === 'חתום').length;
            document.getElementById('stats').innerHTML = 
                `סה"כ: ${apartments.length} | 🟢${exclusive} | 🟣${noExclusive} | 🔵${rental} | 🔴${signed}`;
        }

        init();
    </script>
</body>
</html>

    <link rel="stylesheet" href="leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            direction: rtl;
        }

        #header {
            background: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #header h1 {
            font-size: 1.5em;
        }

        #stats {
            font-size: 0.9em;
            opacity: 0.8;
        }

        #map {
            height: calc(100vh - 60px);
            width: 100%;
        }

        .apartment-popup {
            direction: rtl;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            min-width: 280px;
        }

        .apartment-popup h3 {
            color: #2c3e50;
            margin-bottom: 8px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
        }

        .apartment-popup .detail {
            margin: 5px 0;
            font-size: 0.9em;
        }

        .apartment-popup .detail strong {
            color: #555;
        }

        .apartment-popup .price {
            font-size: 1.2em;
            color: #27ae60;
            font-weight: bold;
            margin-top: 8px;
        }

        .apartment-popup .status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            margin-top: 5px;
            color: white;
        }

        .status-exclusive { background: #27ae60; }
        .status-no-exclusive { background: #9b59b6; }
        .status-rental { background: #3498db; }
        .status-signed { background: #e74c3c; }

        .type-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 0.75em;
            margin-top: 3px;
            background: #ecf0f1;
            color: #2c3e50;
            font-weight: bold;
        }

        .leaflet-popup-content-wrapper {
            border-radius: 10px;
        }

        .note-section {
            margin-top: 10px;
            border-top: 1px solid #eee;
            padding-top: 8px;
        }

        .note-section textarea {
            width: 100%;
            min-height: 60px;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 8px;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            font-size: 0.85em;
            direction: rtl;
            resize: vertical;
        }

        .note-section textarea:focus {
            outline: none;
            border-color: #3498db;
        }

        .save-note-btn {
            margin-top: 5px;
            padding: 5px 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
        }

        .save-note-btn:hover {
            background: #2980b9;
        }

        .saved-note {
            margin-top: 5px;
            padding: 6px 10px;
            background: #fffde7;
            border-right: 3px solid #f39c12;
            border-radius: 3px;
            font-size: 0.85em;
            white-space: pre-wrap;
        }

        .zoom-controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .zoom-btn {
            width: 40px;
            height: 40px;
            background: white;
            border: 2px solid #ccc;
            border-radius: 5px;
            font-size: 1.5em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .zoom-btn:hover {
            background: #f0f0f0;
        }
    </style>
</head>

        // === אתחול המפה ===
        const map = L.map('map', {
            zoomControl: true

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // === צבעי סמנים לפי סטטוס ===
        function getMarkerColor(status) {
            switch(status) {
                case 'exclusive': return '#27ae60';
                case 'no-exclusive': return '#9b59b6';
                case 'rental': return '#3498db';
                case 'signed': return '#e74c3c';
                default: return '#27ae60';
            }
        }

        function getStatusText(status) {
            switch(status) {
                case 'exclusive': return 'בלעדיות';
                case 'no-exclusive': return 'ללא בלעדיות';
                case 'rental': return 'שכירות';
                case 'signed': return 'חתום';
                default: return '';
            }
        }

        function createCustomIcon(color, type) {
            const isProject = type.includes('דירות') || type.includes('פרויקט');
            const size = isProject ? 35 : 28;
            return L.divIcon({
                html: `<div style="
                    background-color: ${color};
                    width: ${size}px;
                    height: ${size}px;
                    border-radius: 50% 50% 50% 0;
                    transform: rotate(-45deg);
                    border: 3px solid white;
                    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
                "></div>`,
                iconSize: [size, size],
                iconAnchor: [size/2, size],
                popupAnchor: [0, -size],
                className: ''
            });
        }

        // === הוספת סמנים למפה ===
        apartments.forEach(apt => {
            const color = getMarkerColor(apt.status);
            const icon = createCustomIcon(color, apt.type);
            const existingNote = savedNotes[apt.id] || '';

            let popupContent = `
                <div class="apartment-popup">
                    <h3>${apt.address}</h3>
                    <div class="detail"><strong>שכונה:</strong> ${apt.neighborhood}</div>
                    <div class="detail"><strong>סוג:</strong> ${apt.type}</div>
            `;

            if (apt.handler) {
                popupContent += `<div class="detail"><strong>בטיפול:</strong> ${apt.handler}</div>`;
            }

            if (apt.price) {
                popupContent += `<div class="detail"><strong>מחיר:</strong> ₪${apt.price}</div>`;
            }

            if (apt.rooms) {
                popupContent += `<div class="detail"><strong>חדרים:</strong> ${apt.rooms}</div>`;
            }

            if (apt.size) {
                popupContent += `<div class="detail"><strong>שטח:</strong> ${apt.size}</div>`;
            }

            if (apt.extras) {
                popupContent += `<div class="detail"><strong>תוספות:</strong> ${apt.extras}</div>`;
            }

            if (apt.notes) {
                popupContent += `<div class="detail"><strong>הערות:</strong> ${apt.notes}</div>`;
            }

            popupContent += `
                    <span class="status status-${apt.status}">${getStatusText(apt.status)}</span>
                    
                    <div class="note-section">
                        ${existingNote ? `<div class="saved-note" id="saved-note-${apt.id}">${existingNote}</div>` : ''}
                        <textarea id="note-input-${apt.id}" placeholder="הוסיפי הערה או מלל...">${existingNote}</textarea>
                        <button class="save-note-btn" onclick="saveNoteForApt(${apt.id})">💾 שמור הערה</button>
                    </div>
                </div>
            `;

            L.marker([apt.lat, apt.lng], { icon: icon })
                .addTo(map)
                .bindPopup(popupContent, { maxWidth: 320 });
        });

        // === פונקציה לשמירת הערה ===
        function saveNoteForApt(id) {
            const textarea = document.getElementById(`note-input-${id}`);
            const text = textarea.value.trim();
            saveNote(id, text);
            
            let savedDiv = document.getElementById(`saved-note-${id}`);
            if (text) {
                if (!savedDiv) {
                    const noteSection = textarea.parentElement;
                    savedDiv = document.createElement('div');
                    savedDiv.className = 'saved-note';
                    savedDiv.id = `saved-note-${id}`;
                    noteSection.insertBefore(savedDiv, textarea);
                }
                savedDiv.textContent = text;
            } else if (savedDiv) {
                savedDiv.remove();
            }
            
            alert('ההערה נשמרה! ✓');
        }

        // === עדכון סטטיסטיקות ===
        const exclusive = apartments.filter(a => a.status === 'exclusive').length;
        const noExclusive = apartments.filter(a => a.status === 'no-exclusive').length;
        const rental = apartments.filter(a => a.status === 'rental').length;
        const signed = apartments.filter(a => a.status === 'signed').length;
        document.getElementById('stats').innerHTML = 
            `סה"כ: ${apartments.length} נכסים | 🟢 בלעדיות: ${exclusive} | 🟣 ללא בלעדיות: ${noExclusive} | 🔵 שכירות: ${rental} | 🔴 חתום: ${signed}`;
